name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Find and Build Android
        run: |
          # البحث عن مجلد android والدخول إليه إذا وجد
          if [ -d "android" ]; then
            cd android
          fi
          
          # التأكد من وجود ملف gradlew وإعطاؤه الصلاحيات
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Error: gradlew not found! Please ensure your Android project structure is correct."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fikh-quize-app
          # سيقوم بالبحث عن أي ملف APK تم إنتاجه ورفعه
          path: "**/build/outputs/apk/debug/*.apk"
