name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        rm -f package-lock.json
        npm install
        npm ci

    - name: Update Capacitor to latest
      run: |
        npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

    - name: Build web assets
      run: npm run build

    - name: Initialize Capacitor
      run: npx cap init fikhQuize com.tayebiahmed.fikhquize --web-dir dist

    - name: Add Android platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Force Gradle 8.13 with Java 21
      run: |
        cd android
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip" > gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew
        
        # Force Java 21 in gradle.properties
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
        cat gradle.properties

    - name: Clean and Build APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
