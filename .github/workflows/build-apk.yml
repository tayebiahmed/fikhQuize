name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        rm -f package-lock.json
        npm install
        npm ci

    - name: Install Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Build web assets
      run: npm run build

    - name: Initialize Capacitor
      run: npx cap init fikhQuize com.tayebiahmed.fikhquize --web-dir dist

    - name: Add Android platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Set up Java 17  # تم التغيير هنا
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'  # استخدام Java 17 بدلاً من 21

    - name: Update Gradle Wrapper to 8.2.1 (متوافق مع Java 17)
      run: |
        cd android
        ./gradlew wrapper --gradle-version 8.2.1 --distribution-type bin
        chmod +x gradlew

    - name: Clean everything
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf android/.gradle
        rm -rf android/app/build
        rm -rf android/capacitor-android/build

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleDebug --stacktrace --no-daemon --refresh-dependencies

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
