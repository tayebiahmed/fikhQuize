name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        rm -f package-lock.json
        npm install
        npm ci

    - name: Update Capacitor to latest
      run: |
        npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

    - name: Build web assets
      run: npm run build

    - name: Initialize Capacitor
      run: npx cap init fikhQuize com.tayebiahmed.fikhquize --web-dir dist

    - name: Add Android platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Platforms
      run: |
        sdkmanager "platforms;android-35"

    - name: Update Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        ./gradlew wrapper --gradle-version=8.7 --distribution-type=bin

    - name: Clean and Build APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
