name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # يسمح بتشغيل يدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. تحميل الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. تثبيت الاعتماديات
      - name: Install dependencies
        run: npm ci

      # 4. بناء مشروع الويب (Vite)
      - name: Build web app
        run: npm run build

      # 5. إعداد Capacitor
      - name: Setup Capacitor
        run: |
          npm install -D @capacitor/cli @capacitor/core
          npm install @capacitor/android
          npx cap init "الخلاصة الفقهية" "com.fiqh.khulasa" --web-dir=dist
          npx cap add android
          npx cap sync

      # 6. إعداد Java (لـ Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 7. بناء APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. رفع APK كملف (Artifact)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/

      # 9. (اختياري) رفع مجلد dist كنسخة احتياطية
      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
